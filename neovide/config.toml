# DOCS https://neovide.dev/config-file.html#available-settings

frame = "buttonless"
no-multigrid = false
title-hidden = true
tabs = false
mouse-cursor-icon = "i-beam"
icon = "~/.config/neovide/macOS icon.icns"  # only in the Dock, elsewhere determined by `replacicon`

[font]
normal = ["JetBrainsMonoNL NF", "Menlo"]
size = 24.5

[box-drawing]
mode = "font-glyph"
